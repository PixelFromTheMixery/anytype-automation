services:
  anytype-automation:
    build: .
    container_name: anytype-automation
    ports:
      - "${IP_ADDR}:8000:8000"
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    networks:
      - anytype-network
    depends_on:
       timetagger:
         condition: service_started 
    environment:
      - PYTHONUNBUFFERED=1
      - TIMETAGGER_URL=http://timetagger:80 
    healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/general/health"]
    interval: 30s
    timeout: 10s
    retries: 3

  timetagger:
    image: ghcr.io/almarklein/timetagger
    container_name: timetagger
    ports:
      - "${IP_ADDR}:80:80"
    volumes:
      - ./_timetagger:/root/_timetagger
    environment:
      - TIMETAGGER_BIND=0.0.0.0:80
      - TIMETAGGER_DATADIR=/root/_timetagger
      - TIMETAGGER_LOG_LEVEL=info
      - TIMETAGGER_APP_REDIRECT=True
      - TIMETAGGER_PROXY_AUTH_TRUSTED=${ALLOWED_IPS}
      # Can be generated via BCypt tooling or at https://timetagger.app/cred
      - TIMETAGGER_CREDENTIALS=test:$$2a$$08$$zMsjPEGdXHzsu0N/felcbuWrffsH4.4ocDWY5oijsZ0cbwSiLNA8. #test:test
    restart: unless-stopped
    networks:
      - anytype-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  anytype-network:
    driver: bridge

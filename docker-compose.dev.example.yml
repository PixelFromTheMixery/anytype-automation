# Docker Compose for development with debugger support and hot-reload
version: "3.9"

services:
  anytype-automation:
    build: .
    container_name: anytype-automation-dev
    ports:
      - "8002:8000"  
      - "5678:5678" 
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    env_file:
      - .env
    volumes:
      - ./src:/app/src  
      - ./config.yaml:/app/config.yaml
      - ./data.yaml:/app/data.yaml
    command: >
      uvicorn main:app 
      --host 0.0.0.0 
      --port 8000 
      --reload 
      --reload-dir /app/src
    restart: unless-stopped
    networks:
      - anytype-network
networks:
  anytype-network:
    driver: bridge

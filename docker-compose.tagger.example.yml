version: "3.9"

services:
  anytype-automation:
    build: .
    container_name: anytype-automation
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data.yaml:/app/data.yaml
    restart: unless-stopped
    networks:
      - anytype-network
    depends_on:
       timetagger:
         condition: service_started 
    environment:
      - TIMETAGGER_URL=http://timetagger:80 
 
  timetagger:
    image: ghcr.io/almarklein/timetagger
    container_name: timetagger
    ports:
      - "80:80"
    volumes:
      - ./_timetagger:/root/_timetagger
    environment:
      - TIMETAGGER_BIND=0.0.0.0:80
      - TIMETAGGER_DATADIR=/root/_timetagger
      - TIMETAGGER_LOG_LEVEL=info
      - TIMETAGGER_CREDENTIALS=test:$$2a$$08$$zMsjPEGdXHzsu0N/felcbuWrffsH4.4ocDWY5oijsZ0cbwSiLNA8.
    restart: unless-stopped
    networks:
      - anytype-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  anytype-network:
    driver: bridge

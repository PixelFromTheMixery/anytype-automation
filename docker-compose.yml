version: "3.9"

services:
  anytype-automation:
    build: .
    container_name: anytype-automation
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data.yaml:/app/data.yaml
    restart: unless-stopped
    networks:
      - anytype-network

networks:
  anytype-network:
    driver: bridge
